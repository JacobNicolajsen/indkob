<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Indkøb">
  <meta name="theme-color" content="#1E1410">
  <base href="/indkob/">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <title>Indkøbsassistent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="app">
    <header id="top-bar">
      <div id="top-left"></div>
      <h1 id="page-title">Madplan</h1>
      <div id="top-actions"></div>
    </header>

    <main id="view-container"></main>

    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="mealplan">
        <span class="nav-icon">📅</span>
        <span>Madplan</span>
      </button>
      <button class="nav-btn" data-view="recipes">
        <span class="nav-icon">📖</span>
        <span>Opskrifter</span>
      </button>
      <button class="nav-btn" data-view="shoppinglist">
        <span class="nav-icon">🛒</span>
        <span>Indkøb</span>
      </button>
      <button class="nav-btn" data-view="more">
        <span class="nav-icon">⚙️</span>
        <span>Mere</span>
      </button>
    </nav>
  </div>

  <!-- Modal overlay lag 1 (sheets) -->
  <div id="modal-root"></div>
  <!-- Modal overlay lag 2 (picker oven på sheet) -->
  <div id="modal-root2"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
