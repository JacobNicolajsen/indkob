<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="38" fill="#1E1410"/>
  <!-- Shopping bag -->
  <g transform="translate(36, 30)">
    <!-- Bag handle -->
    <path d="M30 28 Q30 10 60 10 Q90 10 90 28" fill="none" stroke="#F7F3EE" stroke-width="9" stroke-linecap="round"/>
    <!-- Bag body -->
    <rect x="14" y="28" width="92" height="80" rx="10" fill="#B85C38"/>
    <!-- Bag front detail -->
    <rect x="14" y="28" width="92" height="80" rx="10" fill="none" stroke="#F7F3EE" stroke-width="3" stroke-opacity="0.3"/>
    <!-- Leaf accent -->
    <path d="M45 72 Q60 50 75 72" fill="none" stroke="#4A6741" stroke-width="6" stroke-linecap="round"/>
    <line x1="60" y1="72" x2="60" y2="90" stroke="#4A6741" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
